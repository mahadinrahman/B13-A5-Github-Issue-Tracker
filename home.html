<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Tracker</title>
    <!-- Daisi -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <link rel="stylesheet" href="style.css">
    <style>
        .font-geist{
             font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="font-geist">
<header class="w-11/12 mx-auto pt-[10px] bg-white">
    <section class="flex justify-between pb-3">
       <div class="flex items-center gap-1">
        <img src="./assets/github-logo.png" alt="" class="w-8">
        <h2 class="font-extrabold text-2xl">GitHub Issues Tracker</h2>
       </div>

       <div>
         <div class="join gap-2">
        <label class="input">
           <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <g
          stroke-linejoin="round"
          stroke-linecap="round"
          stroke-width="2.5"
          fill="none"
          stroke="currentColor"
          >
          <circle cx="11" cy="11" r="8"></circle>
         <path d="m21 21-4.3-4.3"></path>
         </g>
         </svg>
        <input id="input-search" type="search" required placeholder="Search Issues..." />
</label>
  
  <button id="btn-search" class="btn btn-primary join-item">Search</button>
</div>
       </div>
    </section>

</header>
<main class="bg-[#F8FAFC] pt-1 pb-10">
      
    <section class=" w-10/12 mx-auto bg-white mt-15 py-3 px-5 my-5 rounded-lg shadow-md">
        <button id="all-btn" onclick="allbtn()" class="btn btn-primary btn-outline p-3 active">All</button>
        <button id="open-btn" class="btn btn-primary btn-outline mx-4 ">Open</button>
        <button id="closed-btn" class="btn btn-primary btn-outline ">Closed</button>
    </section>
    <section class="w-10/12 mx-auto bg-white pt-2 rounded-lg px-5 py-2 flex justify-between shadow-md">
      <div class="flex gap-2 items-center">
        <img src="./assets/Aperture.png" alt="" class="w-10 h-10 bg-slate-100 rounded-full p-1.5">
        <div>
        <p  class=" text-xl font-semibold"><span id="number-issues">50</span> Issues</p>
        <p class="text-gray-600">Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
       <p class="w-4 h-4 bg-green-600 rounded-full"></p>
        <p>Open</p>
        <p class="w-4 h-4 bg-purple-600 rounded-full"></p>
        <p>Close</p>
      </div>
    </section>

    <section id="spinner" class="flex justify-center items-center hidden">
      <span class="loading loading-spinner text-primary"></span>
    </section>

    <section class="bg-[#E4E4E7] w-10/12 mx-auto p-5 rounded-lg shadow-lg">

     <div id="card-container" class="grid grid-cols-2    lg:grid  lg:grid-cols-4 gap-3">

     </div>
    </section>

    <section>
      <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="my_modal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box" >
    <div id="detail-container">
      


    </div>
   
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary ">Close</button>
      </form>
    </div>
  </div>
</dialog>
</section>


    <script src="./home.js"></script>
</main>
    
</body>
</html>
